<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cards</title>
        <link rel="icon" href="data:," />
        <link rel="stylesheet" href="/static/styles.css" />
    </head>
    <body>
        <a class="back-btn" href="/">←</a>

        <div class="study-wrapper">
            <div class="shell">
                <div id="quiz">
                    <div class="prompt-block">
                        <div id="question-text" class="question-text">
                            loading…
                        </div>
                        <div id="card-feedback" class="card-feedback"></div>
                    </div>
                </div>

                <div class="done-screen" id="done">
                    <div class="prompt-block">
                        <div class="question-text">
                            session complete
                            <span class="done-sub" id="done-sub"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="answer-zone" id="answer-zone">
                <div class="answer-block">
                    <input
                        type="text"
                        id="answer-input"
                        placeholder="answer…"
                        autocomplete="off"
                        spellcheck="false"
                    />
                </div>
            </div>
        </div>

        <script src="/static/theme.js"></script>
        <script src="/static/study.js"></script>
    </body>
</html>
